<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fases Mundial 2026</title>
  <style>
    :root{--mx:#006847;--us:#3c3b6e;--ca:#d80621;--ink:#111827;--muted:#64748b;--line:#d7deea;--dark:#0b1220;--shadow:0 18px 45px rgba(15,23,42,.10);--radius:24px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#fff 0,#eef2f7 38%,#e9edf5 100%);color:var(--ink)}
    header{position:sticky;top:0;z-index:50;color:#fff;background:linear-gradient(120deg,rgba(0,104,71,.98),rgba(60,59,110,.96) 52%,rgba(216,6,33,.97));box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .hero{max-width:1540px;margin:auto;padding:22px 24px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.hero h1{font-size:clamp(26px,3.2vw,46px);letter-spacing:-.055em;margin:0;line-height:1}.sub{opacity:.88;margin-top:8px;font-size:14px}.statusbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill,.nav-link{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;white-space:nowrap;color:#fff;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.28)}
    main{max-width:1540px;margin:auto;padding:22px}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:24px 0 12px}.section-title h2{margin:0;font-size:24px;letter-spacing:-.04em}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 18px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#dbe3f0;color:#24304a;font-weight:950;cursor:pointer}.tab.active{background:var(--dark);color:#fff}.metrics{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin-bottom:18px}.metric{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}.metric .k{font-size:12px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.04em}.metric .v{font-size:32px;font-weight:1000;letter-spacing:-.04em;margin-top:4px}.layout{display:grid;grid-template-columns:420px 1fr;gap:18px;align-items:start}.grid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:18px}.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:16px 18px;color:#fff;background:linear-gradient(135deg,#101827,#31415f);display:flex;justify-content:space-between;gap:10px;align-items:center}.card-head h3{margin:0;font-size:22px;letter-spacing:-.035em}.card-body{padding:14px}.standings{display:grid;gap:6px}.row{display:grid;grid-template-columns:30px 1fr repeat(5,38px);gap:6px;align-items:center;font-size:12px;padding:7px;border-radius:13px}.row.header{font-weight:950;color:var(--muted)}.row.advance{background:#e9fbf3}.row.third{background:#fff7e6}.team{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.muted{color:var(--muted)}.stage{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:14px}.match{position:relative;border:1px solid var(--line);background:#fff;border-radius:20px;padding:14px 14px 14px 18px;box-shadow:0 8px 20px rgba(15,23,42,.06)}.match:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:5px;border-radius:0 8px 8px 0;background:#94a3b8}.match.mex:before{background:var(--mx)}.match.us:before{background:var(--us)}.match.ca:before{background:var(--ca)}.match-id{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.04em}.side{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #eef2f7}.side:last-child{border-bottom:0}.side-team{font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag{font-size:11px;font-weight:950;border-radius:999px;padding:5px 8px;background:#eef2ff;color:#24304a}.unknown .side-team{color:#64748b}.thirds{display:grid;gap:8px}.footer{padding:24px;color:var(--muted);font-size:12px;text-align:center}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:26px;color:var(--muted);text-align:center}
    @media(max-width:1180px){.hero{grid-template-columns:1fr}.statusbar{justify-content:flex-start}.layout{grid-template-columns:1fr}.metrics,.grid,.stage{grid-template-columns:1fr}}@media(max-width:640px){main{padding:12px}.row{grid-template-columns:26px 1fr repeat(3,34px)}.row span:nth-child(n+6){display:none}.card{border-radius:22px}.card-head{display:block}.section-title{display:block}}
  </style>
</head>
<body>
<header><div class="hero"><div><h1>Fases Mundial 2026</h1><div class="sub">Fase actual y siguiente fase</div></div><div class="statusbar"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="predicciones.html">Predicciones</a><div class="pill">Datos: <span id="lastUpdated">—</span></div></div></div></header>
<main>
  <section class="tabs" id="phaseTabs"></section>
  <section class="metrics"><div class="metric"><div class="k">Fase actual</div><div class="v" id="currentPhase">—</div></div><div class="metric"><div class="k">Clasificados</div><div class="v" id="qualifiedCount">0</div></div><div class="metric"><div class="k">Mejores terceros</div><div class="v" id="thirdCount">0</div></div><div class="metric"><div class="k">32avos</div><div class="v">16</div></div></section>
  <section id="groupsPanel" class="layout"><div><div class="section-title"><h2>Grupos</h2></div><div id="groupsGrid" class="grid"></div></div><div><div class="section-title"><h2>32avos de final</h2></div><div id="roundOf32" class="stage"></div></div></section>
  <section id="stagePanel" style="display:none"><div class="section-title"><h2 id="stageTitle">—</h2></div><div id="stageGrid" class="stage"></div></section>
  <section><div class="section-title"><h2>Mejores terceros</h2></div><section class="card"><div class="card-body"><div id="thirdsRanking" class="thirds"></div></div></section></section>
</main>
<div class="footer">© 2026 Camu · Todos los derechos reservados</div>
<script>
const DATA_URL='./worldcup_results.json';
const GROUPS='ABCDEFGHIJKL'.split('');
const PHASES=['Fase de grupos','32avos','16avos','Octavos','Cuartos','Semifinales','Final'];
const FLAGS={'México':'🇲🇽','Sudáfrica':'🇿🇦','Corea del Sur':'🇰🇷','Korea Republic':'🇰🇷','Chequia':'🇨🇿','Czechia':'🇨🇿','Canadá':'🇨🇦','Bosnia y Herzegovina':'🇧🇦','Qatar':'🇶🇦','Suiza':'🇨🇭','Estados Unidos':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turquía':'🇹🇷','Brasil':'🇧🇷','Marruecos':'🇲🇦','Haití':'🇭🇹','Escocia':'🏴','Alemania':'🇩🇪','Curazao':'🇨🇼','Costa de Marfil':'🇨🇮','Ecuador':'🇪🇨','Países Bajos':'🇳🇱','Japón':'🇯🇵','Suecia':'🇸🇪','Túnez':'🇹🇳','Bélgica':'🇧🇪','Egipto':'🇪🇬','Irán':'🇮🇷','Nueva Zelanda':'🇳🇿','España':'🇪🇸','Cabo Verde':'🇨🇻','Arabia Saudita':'🇸🇦','Uruguay':'🇺🇾','Francia':'🇫🇷','Senegal':'🇸🇳','Irak':'🇮🇶','Noruega':'🇳🇴','Argentina':'🇦🇷','Argelia':'🇩🇿','Austria':'🇦🇹','Jordania':'🇯🇴','Portugal':'🇵🇹','RD Congo':'🇨🇩','Uzbekistán':'🇺🇿','Colombia':'🇨🇴','Inglaterra':'🏴','Croacia':'🇭🇷','Ghana':'🇬🇭','Panamá':'🇵🇦'};
const R32=[['73','2A','2B'],['74','1E','3A/B/C/D/F'],['75','1F','2C'],['76','1C','2F'],['77','1I','3C/D/F/G/H'],['78','2E','2I'],['79','1A','3C/E/F/H/I'],['80','1L','3E/H/I/J/K'],['81','1D','3B/E/F/I/J'],['82','1G','3A/E/H/I/J'],['83','2K','2L'],['84','1H','2J'],['85','1B','3E/F/G/I/J'],['86','1J','2H'],['87','1K','3D/E/I/J/L'],['88','2D','2G']];
let games=[],tables={},thirds=[];const $=id=>document.getElementById(id);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function flag(t){return FLAGS[t]||'🏳️'}function parseScore(score){const m=String(score||'').match(/(\d+)\s*-\s*(\d+)/);return m?[Number(m[1]),Number(m[2])]:null}
function initTeam(name){return{team:name,pts:0,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0}}
function buildTables(){const map={};games.filter(g=>g.group&&g.group!=='KO').forEach(g=>{map[g.group]=map[g.group]||{};[g.team1,g.team2].forEach(t=>{if(t&&!map[g.group][t])map[g.group][t]=initTeam(t)});if(String(g.status).toLowerCase()==='final'){const s=parseScore(g.score);if(!s)return;const a=map[g.group][g.team1],b=map[g.group][g.team2];a.pj++;b.pj++;a.gf+=s[0];a.gc+=s[1];b.gf+=s[1];b.gc+=s[0];if(s[0]>s[1]){a.g++;b.p++;a.pts+=3}else if(s[0]<s[1]){b.g++;a.p++;b.pts+=3}else{a.e++;b.e++;a.pts++;b.pts++}a.dg=a.gf-a.gc;b.dg=b.gf-b.gc}});tables={};GROUPS.forEach(gr=>{tables[gr]=Object.values(map[gr]||{}).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es'))});thirds=GROUPS.map(g=>tables[g]?.[2]?{...tables[g][2],group:g}:null).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es'))}
function slotLabel(slot){if(/^1[A-L]$/.test(slot))return`1º Grupo ${slot[1]}`;if(/^2[A-L]$/.test(slot))return`2º Grupo ${slot[1]}`;if(/^3/.test(slot))return slot;return slot}
function resolveSlot(slot){if(/^1[A-L]$/.test(slot)){const t=tables[slot[1]]?.[0];return t?{name:t.team,tag:slotLabel(slot),known:true}:null}if(/^2[A-L]$/.test(slot)){const t=tables[slot[1]]?.[1];return t?{name:t.team,tag:slotLabel(slot),known:true}:null}return null}
function sideHTML(slot){const r=resolveSlot(slot);if(r)return`<div class="side"><div class="side-team">${flag(r.name)} ${esc(r.name)}</div><div class="tag">${esc(r.tag)}</div></div>`;return`<div class="side unknown"><div class="side-team">Por definir</div><div class="tag">${esc(slotLabel(slot))}</div></div>`}
function matchHTML(m){const a=resolveSlot(m[1]);const cls=a?.name==='México'?'mex':'';return`<article class="match ${cls}"><div class="match-id">Partido ${m[0]} · 32avos</div>${sideHTML(m[1])}${sideHTML(m[2])}</article>`}
function renderGroups(){$('groupsGrid').innerHTML=GROUPS.map(g=>`<section class="card"><div class="card-head"><h3>Grupo ${g}</h3><span>${tables[g]?.length||0}</span></div><div class="card-body"><div class="standings"><div class="row header"><span>#</span><span>Equipo</span><span>PTS</span><span>PJ</span><span>DG</span><span>GF</span><span>GC</span></div>${(tables[g]||[]).map((t,i)=>`<div class="row ${i<2?'advance':i===2?'third':''}"><span>${i+1}</span><span class="team">${flag(t.team)} ${esc(t.team)}</span><span>${t.pts}</span><span>${t.pj}</span><span>${t.dg}</span><span>${t.gf}</span><span>${t.gc}</span></div>`).join('')}</div></div></section>`).join('')}
function renderThirds(){$('thirdCount').textContent=Math.min(8,thirds.length);$('thirdsRanking').innerHTML=thirds.length?thirds.map((t,i)=>`<div class="row ${i<8?'advance':''}"><span>${i+1}</span><span class="team">${flag(t.team)} ${esc(t.team)}</span><span>${t.pts}</span><span>${t.pj}</span><span>${t.dg}</span><span>${t.gf}</span><span>${t.gc}</span></div>`).join(''):'<div class="empty">Sin terceros definidos.</div>'}
function renderR32(){$('roundOf32').innerHTML=R32.map(matchHTML).join('')}
function renderStage(name){$('groupsPanel').style.display=name==='Fase de grupos'?'grid':'none';$('stagePanel').style.display=name==='Fase de grupos'?'none':'block';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.phase===name));if(name!=='Fase de grupos'){$('stageTitle').textContent=name;const count={['32avos']:16,['16avos']:8,['Octavos']:4,['Cuartos']:2,['Semifinales']:2,['Final']:1}[name]||0;if(name==='32avos')$('stageGrid').innerHTML=R32.map(matchHTML).join('');else $('stageGrid').innerHTML=Array.from({length:count},(_,i)=>`<article class="match"><div class="match-id">Partido ${i+1} · ${esc(name)}</div>${sideHTML('Por definir')}${sideHTML('Por definir')}</article>`).join('')}}
function renderTabs(){ $('phaseTabs').innerHTML=PHASES.map((p,i)=>`<button class="tab ${i===0?'active':''}" data-phase="${esc(p)}">${esc(p)}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>renderStage(b.dataset.phase)))}
async function loadData(){const res=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});const payload=await res.json();games=Array.isArray(payload)?payload:payload.games||[];$('lastUpdated').textContent=payload.updatedAt?new Date(payload.updatedAt).toLocaleString('es-MX'):'—';buildTables();renderTabs();renderGroups();renderThirds();renderR32();$('currentPhase').textContent='Grupos';$('qualifiedCount').textContent=GROUPS.reduce((sum,g)=>sum+Math.min(2,tables[g]?.length||0),0);}
loadData().catch(e=>{console.error(e);document.querySelector('main').innerHTML='<div class="empty">No se pudo cargar información.</div>'});
</script>
</body>
</html>
