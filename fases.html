<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fases Mundial 2026</title>
  <style>
    :root{--mx:#006847;--us:#3c3b6e;--ca:#d80621;--ink:#111827;--muted:#64748b;--line:#d7deea;--dark:#0b1220;--shadow:0 18px 45px rgba(15,23,42,.10);--radius:24px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#fff 0,#eef2f7 38%,#e9edf5 100%);color:var(--ink)}
    header{position:sticky;top:0;z-index:50;color:#fff;background:linear-gradient(120deg,rgba(0,104,71,.98),rgba(60,59,110,.96) 52%,rgba(216,6,33,.97));box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .hero{max-width:1540px;margin:auto;padding:22px 24px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.hero h1{font-size:clamp(26px,3.2vw,46px);letter-spacing:-.055em;margin:0;line-height:1}.sub{opacity:.88;margin-top:8px;font-size:14px}.statusbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill,.nav-link{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;white-space:nowrap;color:#fff;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.28)}
    main{max-width:1540px;margin:auto;padding:22px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#dbe3f0;color:#24304a;font-weight:950;cursor:pointer}.tab.active{background:var(--dark);color:#fff}.metrics{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin-bottom:18px}.metric{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}.metric .k{font-size:12px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.04em}.metric .v{font-size:30px;font-weight:1000;letter-spacing:-.04em;margin-top:4px}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:24px 0 12px}.section-title h2{margin:0;font-size:24px;letter-spacing:-.04em}.grid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:18px}.stage-grid{display:grid;grid-template-columns:repeat(2,minmax(360px,1fr));gap:14px}.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:16px 18px;color:#fff;background:linear-gradient(135deg,#101827,#31415f);display:flex;justify-content:space-between;gap:10px;align-items:center}.card-head h3{margin:0;font-size:22px;letter-spacing:-.035em}.card-body{padding:14px}
    .standings{display:grid;gap:6px}.row{display:grid;grid-template-columns:30px 1fr repeat(5,38px);gap:6px;align-items:center;font-size:12px;padding:7px;border-radius:13px}.row.header{font-weight:950;color:var(--muted)}.row.advance{background:#e9fbf3}.row.third{background:#fff7e6}.team{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.muted{color:var(--muted)}
    .match{position:relative;border:1px solid var(--line);background:#fff;border-radius:20px;padding:14px 14px 14px 18px;box-shadow:0 8px 20px rgba(15,23,42,.06)}.match:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:5px;border-radius:0 8px 8px 0;background:#94a3b8}.match.mex:before{background:var(--mx)}.match.us:before{background:var(--us)}.match.ca:before{background:var(--ca)}.match-id{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}.side{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #eef2f7}.side-team{font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag{font-size:11px;font-weight:950;border-radius:999px;padding:5px 8px;background:#eef2ff;color:#24304a}.unknown .side-team{color:#64748b}.match-meta{margin-top:10px;padding-top:10px;border-top:1px solid #eef2f7;color:var(--muted);font-size:12px;line-height:1.45}.match-meta strong{color:#111827}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:840px}th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px}th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#fbfcff}tr:last-child td{border-bottom:0}.footer{padding:24px;color:var(--muted);font-size:12px;text-align:center}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:26px;color:var(--muted);text-align:center}
    @media(max-width:1180px){.hero{grid-template-columns:1fr}.statusbar{justify-content:flex-start}.metrics,.grid,.stage-grid{grid-template-columns:1fr}}@media(max-width:640px){main{padding:12px}.metrics{grid-template-columns:1fr}.row{grid-template-columns:26px 1fr repeat(3,34px)}.row span:nth-child(n+6){display:none}.card{border-radius:22px}.card-head{display:block}.section-title{display:block}.stage-grid{gap:12px}}
  </style>
</head>
<body>
<header><div class="hero"><div><h1>Fases Mundial 2026</h1><div class="sub">Fase actual y siguiente fase</div></div><div class="statusbar"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="predicciones.html">Predicciones</a><div class="pill">Datos: <span id="lastUpdated">—</span></div></div></div></header>
<main>
  <section class="tabs" id="phaseTabs"></section>
  <section class="metrics"><div class="metric"><div class="k">Fase seleccionada</div><div class="v" id="selectedPhase">—</div></div><div class="metric"><div class="k">Partidos</div><div class="v" id="phaseMatchCount">0</div></div><div class="metric"><div class="k">Participantes</div><div class="v" id="participantCount">0</div></div><div class="metric"><div class="k">Grupos</div><div class="v">12</div></div></section>
  <section><div class="section-title"><h2 id="matchesTitle">32avos de final</h2></div><div id="matchesGrid" class="stage-grid"></div></section>
  <section><div class="section-title"><h2>Participantes</h2></div><div id="participantsTable"></div></section>
  <section id="groupsSection"><div class="section-title"><h2>Grupos</h2></div><div id="groupsGrid" class="grid"></div></section>
</main>
<div class="footer">© 2026 Camu · Todos los derechos reservados</div>
<script>
const DATA_URL='./worldcup_results.json';
const GROUPS='ABCDEFGHIJKL'.split('');
const PHASES=['Fase de grupos','32avos','Octavos','Cuartos','Semifinales','Tercer lugar','Final'];
const STAGE_MAP={'32avos':'32avos de final','Octavos':'Octavos de final','Cuartos':'Cuartos de final','Semifinales':'Semifinal','Tercer lugar':'Tercer lugar','Final':'Final'};
const FLAGS={'México':'🇲🇽','Sudáfrica':'🇿🇦','Corea del Sur':'🇰🇷','Korea Republic':'🇰🇷','Chequia':'🇨🇿','Czechia':'🇨🇿','Canadá':'🇨🇦','Bosnia y Herzegovina':'🇧🇦','Qatar':'🇶🇦','Suiza':'🇨🇭','Estados Unidos':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turquía':'🇹🇷','Brasil':'🇧🇷','Marruecos':'🇲🇦','Haití':'🇭🇹','Escocia':'🏴','Alemania':'🇩🇪','Curazao':'🇨🇼','Costa de Marfil':'🇨🇮','Ecuador':'🇪🇨','Países Bajos':'🇳🇱','Japón':'🇯🇵','Suecia':'🇸🇪','Túnez':'🇹🇳','Bélgica':'🇧🇪','Egipto':'🇪🇬','Irán':'🇮🇷','Nueva Zelanda':'🇳🇿','España':'🇪🇸','Cabo Verde':'🇨🇻','Arabia Saudita':'🇸🇦','Uruguay':'🇺🇾','Francia':'🇫🇷','Senegal':'🇸🇳','Irak':'🇮🇶','Noruega':'🇳🇴','Argentina':'🇦🇷','Argelia':'🇩🇿','Austria':'🇦🇹','Jordania':'🇯🇴','Portugal':'🇵🇹','RD Congo':'🇨🇩','Uzbekistán':'🇺🇿','Colombia':'🇨🇴','Inglaterra':'🏴','Croacia':'🇭🇷','Ghana':'🇬🇭','Panamá':'🇵🇦'};
let games=[],tables={},currentPhase='Fase de grupos';const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function flag(t){return FLAGS[t]||'🏳️'}function parseScore(score){const m=String(score||'').match(/(\d+)\s*-\s*(\d+)/);return m?[Number(m[1]),Number(m[2])]:null}function initTeam(name){return{team:name,pts:0,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0}}
function sourceDateTime(g){const time=g.time||'00:00';return new Date(`${g.date}T${time}:00-06:00`)}function fmtDateTime(g){if(!g?.date)return'Fecha por definir';const dt=sourceDateTime(g);const date=dt.toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});const time=g.time?dt.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'}):'Hora por definir';return `${date} · ${time}`}
function shortStageLabel(stage){return String(stage||'').replace(' de final','').replace('Fase de grupos','Grupos')}
function buildTables(){const map={};games.filter(g=>g.group&&g.group!=='KO').forEach(g=>{map[g.group]=map[g.group]||{};[g.team1,g.team2].forEach(t=>{if(t&&!map[g.group][t])map[g.group][t]=initTeam(t)});if(String(g.status||'').toLowerCase()==='final'){const s=parseScore(g.score);if(!s)return;const a=map[g.group][g.team1],b=map[g.group][g.team2];a.pj++;b.pj++;a.gf+=s[0];a.gc+=s[1];b.gf+=s[1];b.gc+=s[0];if(s[0]>s[1]){a.g++;b.p++;a.pts+=3}else if(s[0]<s[1]){b.g++;a.p++;b.pts+=3}else{a.e++;b.e++;a.pts++;b.pts++}a.dg=a.gf-a.gc;b.dg=b.gf-b.gc}});tables={};GROUPS.forEach(gr=>{tables[gr]=Object.values(map[gr]||{}).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es')).map((t,i)=>({...t,group:gr,pos:i+1}))})}
function slotLabel(slot){slot=String(slot||'');if(/^1[A-L]$/.test(slot))return`1º Grupo ${slot[1]}`;if(/^2[A-L]$/.test(slot))return`2º Grupo ${slot[1]}`;if(/^3/.test(slot))return slot.replace(/^3/,'3º Grupo ');return slot}
function resolveSlot(slot){slot=String(slot||'');let m=slot.match(/^([12])([A-L])$/);if(m){const t=tables[m[2]]?.[Number(m[1])-1];return t?{name:t.team,tag:slotLabel(slot),known:true,origin:slotLabel(slot)}:null}m=slot.match(/^([12])º Grupo ([A-L])$/);if(m){const t=tables[m[2]]?.[Number(m[1])-1];return t?{name:t.team,tag:slot,known:true,origin:slot}:null}if(/^3/.test(slot)||slot.includes('/'))return null;m=slot.match(/^Ganador (P\d+)/);if(m){const g=games.find(x=>String(x.id)===m[1]);const w=winnerFromGame(g);return w?{name:w,tag:slot,known:true,origin:slot}:null}if(slot&&slot!=='Por definir')return{name:slot,tag:'',known:true,origin:''};return null}
function winnerFromGame(g){if(!g||String(g.status||'').toLowerCase()!=='final')return null;const s=parseScore(g.score);if(!s)return null;const side=s[0]>s[1]?g.team1:s[1]>s[0]?g.team2:null;if(!side)return null;const r=resolveSlot(side);return r?.name||side}
function sideHTML(slot){const r=resolveSlot(slot);if(r&&r.name&&!/^Ganador /.test(r.name))return`<div class="side"><div class="side-team">${flag(r.name)} ${esc(r.name)}</div><div class="tag">${esc(r.tag||r.origin||'')}</div></div>`;return`<div class="side unknown"><div class="side-team">Por definir</div><div class="tag">${esc(slotLabel(slot))}</div></div>`}
function matchClass(g){if(g.host==='México')return'mex';if(g.host==='Estados Unidos')return'us';if(g.host==='Canadá')return'ca';return''}
function matchHTML(g){return`<article class="match ${matchClass(g)}"><div class="match-id">${esc(g.notes||g.id)} · ${esc(shortStageLabel(g.stage))}</div>${sideHTML(g.team1)}${sideHTML(g.team2)}<div class="match-meta"><strong>${esc(fmtDateTime(g))}</strong><br>${esc(g.venue||'Sede por definir')}</div></article>`}
function gamesForPhase(phase){if(phase==='Fase de grupos')return games.filter(g=>g.stage==='32avos de final').sort((a,b)=>sourceDateTime(a)-sourceDateTime(b));const stage=STAGE_MAP[phase];return games.filter(g=>g.stage===stage).sort((a,b)=>sourceDateTime(a)-sourceDateTime(b))}
function renderGroups(){ $('groupsGrid').innerHTML=GROUPS.map(g=>`<section class="card"><div class="card-head"><h3>Grupo ${g}</h3><span>${tables[g]?.length||0}</span></div><div class="card-body"><div class="standings"><div class="row header"><span>#</span><span>Equipo</span><span>PTS</span><span>PJ</span><span>DG</span><span>GF</span><span>GC</span></div>${(tables[g]||[]).map((t,i)=>`<div class="row ${i<2?'advance':i===2?'third':''}"><span>${i+1}</span><span class="team">${flag(t.team)} ${esc(t.team)}</span><span>${t.pts}</span><span>${t.pj}</span><span>${t.dg}</span><span>${t.gf}</span><span>${t.gc}</span></div>`).join('')}</div></div></section>`).join('') }
function allGroupParticipants(){return GROUPS.flatMap(g=>(tables[g]||[]).map(t=>({equipo:t.team,origen:`Grupo ${g}`,posicion:`${t.pos}º`,pts:t.pts,pj:t.pj,dg:t.dg,gf:t.gf,gc:t.gc,estado:t.pos<=2?'Clasificación':t.pos===3?'Tercer lugar':'Grupo'})))}
function phaseParticipants(phase){if(phase==='Fase de grupos')return allGroupParticipants();const rows=[];gamesForPhase(phase).forEach(g=>{[[g.team1,g.team2],[g.team2,g.team1]].forEach(([slot,rivalSlot])=>{const r=resolveSlot(slot),rv=resolveSlot(rivalSlot);rows.push({equipo:r?.name||'Por definir',origen:r?.origin||slotLabel(slot),partido:g.notes||g.id,rival:rv?.name||slotLabel(rivalSlot),fecha:fmtDateTime(g),sede:g.venue||'Sede por definir'})})});return rows}
function renderParticipants(phase){const rows=phaseParticipants(phase);$('participantCount').textContent=rows.length;if(phase==='Fase de grupos'){$('participantsTable').innerHTML=`<div class="table-wrap"><table><thead><tr><th>Equipo</th><th>Grupo</th><th>Posición</th><th>PTS</th><th>PJ</th><th>DG</th><th>GF</th><th>GC</th><th>Estado</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${flag(r.equipo)} ${esc(r.equipo)}</strong></td><td>${esc(r.origen)}</td><td>${esc(r.posicion)}</td><td>${r.pts}</td><td>${r.pj}</td><td>${r.dg}</td><td>${r.gf}</td><td>${r.gc}</td><td>${esc(r.estado)}</td></tr>`).join('')}</tbody></table></div>`}else{$('participantsTable').innerHTML=rows.length?`<div class="table-wrap"><table><thead><tr><th>Participante</th><th>Origen</th><th>Partido</th><th>Rival</th><th>Fecha</th><th>Sede</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${r.equipo==='Por definir'?'':flag(r.equipo)+' '}${esc(r.equipo)}</strong></td><td>${esc(r.origen)}</td><td>${esc(r.partido)}</td><td>${esc(r.rival)}</td><td>${esc(r.fecha)}</td><td>${esc(r.sede)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">Sin partidos definidos.</div>'}}
function renderPhase(phase){currentPhase=phase;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.phase===phase));const matchPhase=phase==='Fase de grupos'?'32avos':phase;const list=gamesForPhase(phase);$('selectedPhase').textContent=phase==='Fase de grupos'?'Grupos':phase;$('matchesTitle').textContent=phase==='Fase de grupos'?'32avos de final':(STAGE_MAP[phase]||phase);$('phaseMatchCount').textContent=list.length;$('matchesGrid').innerHTML=list.length?list.map(matchHTML).join(''):'<div class="empty">Sin partidos definidos.</div>';$('groupsSection').style.display=phase==='Fase de grupos'?'block':'none';renderParticipants(phase)}
function renderTabs(){ $('phaseTabs').innerHTML=PHASES.map(p=>`<button class="tab" data-phase="${esc(p)}">${esc(p)}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>renderPhase(b.dataset.phase)))}
async function loadData(){const res=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});const payload=await res.json();games=Array.isArray(payload)?payload:payload.games||[];$('lastUpdated').textContent=payload.updatedAt?new Date(payload.updatedAt).toLocaleString('es-MX'):'—';buildTables();renderTabs();renderGroups();renderPhase('Fase de grupos')}
loadData().catch(e=>{console.error(e);document.querySelector('main').innerHTML='<div class="empty">No se pudo cargar información.</div>'});
</script>
</body>
</html>
