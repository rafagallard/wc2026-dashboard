<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eliminatorias Mundial 2026</title>
  <style>
    :root{--mx:#006847;--us:#3c3b6e;--ca:#d80621;--ink:#111827;--muted:#64748b;--line:#d7deea;--dark:#0b1220;--good:#dcfce7;--warn:#fff7e6;--bad:#f1f5f9;--shadow:0 18px 45px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7f9;color:var(--ink)}
    header{position:relative;z-index:50;color:#fff;background:linear-gradient(120deg,rgba(0,104,71,.98),rgba(60,59,110,.96) 52%,rgba(216,6,33,.97));box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .hero{max-width:1720px;margin:auto;padding:18px 22px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.hero h1{font-size:clamp(24px,3vw,40px);letter-spacing:-.055em;margin:0;line-height:1}.sub{opacity:.88;margin-top:7px;font-size:14px}.statusbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill,.nav-link{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;white-space:nowrap;color:#fff;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.28)}
    main{max-width:1720px;margin:auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 18px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#dbe3f0;color:#24304a;font-weight:950;cursor:pointer}.tab.active{background:var(--dark);color:#fff}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:20px 0 12px}.section-title h2{margin:0;font-size:24px;letter-spacing:-.04em}.legend{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;font-weight:850}.legend span{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(390px,1fr));gap:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:14px 16px;color:#fff;background:linear-gradient(135deg,#101827,#31415f);display:flex;justify-content:space-between;gap:10px;align-items:center}.card-head h3{margin:0;font-size:20px;letter-spacing:-.035em}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:680px}th,td{padding:10px 11px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px}th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#fbfcff}td.num,th.num{text-align:center}.team{font-weight:1000;white-space:nowrap}.rank{font-weight:1000;color:#475569}.direct{background:var(--good)}.third{background:var(--warn)}.out{background:var(--bad);color:#475569}.status{font-size:11px;font-weight:1000;border-radius:999px;padding:5px 8px;display:inline-block}.status.direct{color:#166534}.status.third{color:#92400e}.status.out{color:#475569}
    .bracket-shell{overflow-x:auto;border:1px solid var(--line);background:#f8fafc;border-radius:22px;box-shadow:var(--shadow);padding:14px}.bracket{min-width:1680px;display:grid;grid-template-columns:170px 155px 155px 155px 210px 155px 155px 155px 170px;grid-template-rows:32px repeat(28,32px);gap:6px 14px;position:relative}.round-title{text-align:center;color:#30415f;font-size:14px;font-weight:900;align-self:center}.match{position:relative;background:#fff;border:1px solid #b9c3d2;border-radius:8px;padding:6px 8px;box-shadow:0 3px 8px rgba(15,23,42,.05);align-self:center}.match-id{position:absolute;left:-36px;top:34px;font-size:12px;color:#000;text-decoration:underline;font-weight:850}.right .match-id{left:auto;right:-36px}.match-date{display:flex;justify-content:space-between;gap:8px;color:#334155;font-size:12px;margin-bottom:6px}.side{height:31px;display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;border:1px solid #d6dce7;border-radius:6px;padding:5px 7px;margin:4px 0;background:#fff}.side-team{font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:13px;font-weight:1000}.winner{font-weight:1000}.winner .side-team,.winner .score{color:#111827}.winner:after{content:"";position:absolute;right:8px;bottom:5px;width:28px;border-bottom:2px solid #22c55e}.loser{color:#64748b}.connector{position:relative}.connector:after{content:"";position:absolute;top:50%;left:-14px;right:-14px;border-top:1px solid #c8d0dc}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:26px;color:var(--muted);text-align:center}.footer{padding:24px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:760px){main{padding:12px}.hero{grid-template-columns:1fr}.statusbar{justify-content:flex-start}.grid{grid-template-columns:1fr}table{min-width:620px}.bracket{min-width:1500px}}
  </style>
</head>
<body>
<header><div class="hero"><div><h1>Eliminatorias Mundial 2026</h1><div class="sub">Bracket del torneo</div></div><div class="statusbar"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="predicciones.html">Predicciones</a><div class="pill">Datos: <span id="lastUpdated">тАФ</span></div></div></div></header>
<main>
  <section id="knockoutView"><div class="section-title"><h2>Eliminatorias</h2></div><div class="bracket-shell"><div id="bracketGrid" class="bracket"></div></div></section>
</main>
<div class="footer">┬й 2026 Camu ┬╖ Todos los derechos reservados</div>
<script>
const DATA_URL='./worldcup_results.json';
const GROUPS='ABCDEFGHIJKL'.split('');
const FLAGS={'M├йxico':'ЁЯЗ▓ЁЯЗ╜','Mexico':'ЁЯЗ▓ЁЯЗ╜','Sud├бfrica':'ЁЯЗ┐ЁЯЗж','South Africa':'ЁЯЗ┐ЁЯЗж','Corea del Sur':'ЁЯЗ░ЁЯЗ╖','Korea Republic':'ЁЯЗ░ЁЯЗ╖','Chequia':'ЁЯЗиЁЯЗ┐','Czechia':'ЁЯЗиЁЯЗ┐','Canad├б':'ЁЯЗиЁЯЗж','Canada':'ЁЯЗиЁЯЗж','Bosnia y Herzegovina':'ЁЯЗзЁЯЗж','Bosnia and Herzegovina':'ЁЯЗзЁЯЗж','Qatar':'ЁЯЗ╢ЁЯЗж','Suiza':'ЁЯЗиЁЯЗн','Switzerland':'ЁЯЗиЁЯЗн','Estados Unidos':'ЁЯЗ║ЁЯЗ╕','United States':'ЁЯЗ║ЁЯЗ╕','Paraguay':'ЁЯЗ╡ЁЯЗ╛','Australia':'ЁЯЗжЁЯЗ║','Turqu├нa':'ЁЯЗ╣ЁЯЗ╖','Brasil':'ЁЯЗзЁЯЗ╖','Brazil':'ЁЯЗзЁЯЗ╖','Marruecos':'ЁЯЗ▓ЁЯЗж','Morocco':'ЁЯЗ▓ЁЯЗж','Hait├н':'ЁЯЗнЁЯЗ╣','Escocia':'ЁЯП┤','Alemania':'ЁЯЗйЁЯЗк','Germany':'ЁЯЗйЁЯЗк','Curazao':'ЁЯЗиЁЯЗ╝','Costa de Marfil':'ЁЯЗиЁЯЗо','Ivory Coast':'ЁЯЗиЁЯЗо',"C├┤te d'Ivoire":'ЁЯЗиЁЯЗо','Ecuador':'ЁЯЗкЁЯЗи','Pa├нses Bajos':'ЁЯЗ│ЁЯЗ▒','Netherlands':'ЁЯЗ│ЁЯЗ▒','Jap├│n':'ЁЯЗпЁЯЗ╡','Japan':'ЁЯЗпЁЯЗ╡','Suecia':'ЁЯЗ╕ЁЯЗк','Sweden':'ЁЯЗ╕ЁЯЗк','T├║nez':'ЁЯЗ╣ЁЯЗ│','B├йlgica':'ЁЯЗзЁЯЗк','Belgium':'ЁЯЗзЁЯЗк','Egipto':'ЁЯЗкЁЯЗм','Egypt':'ЁЯЗкЁЯЗм','Ir├бn':'ЁЯЗоЁЯЗ╖','Nueva Zelanda':'ЁЯЗ│ЁЯЗ┐','Espa├▒a':'ЁЯЗкЁЯЗ╕','Spain':'ЁЯЗкЁЯЗ╕','Cabo Verde':'ЁЯЗиЁЯЗ╗','Cape Verde':'ЁЯЗиЁЯЗ╗','Arabia Saudita':'ЁЯЗ╕ЁЯЗж','Uruguay':'ЁЯЗ║ЁЯЗ╛','Francia':'ЁЯЗлЁЯЗ╖','France':'ЁЯЗлЁЯЗ╖','Senegal':'ЁЯЗ╕ЁЯЗ│','Irak':'ЁЯЗоЁЯЗ╢','Noruega':'ЁЯЗ│ЁЯЗ┤','Norway':'ЁЯЗ│ЁЯЗ┤','Argentina':'ЁЯЗжЁЯЗ╖','Argelia':'ЁЯЗйЁЯЗ┐','Algeria':'ЁЯЗйЁЯЗ┐','Austria':'ЁЯЗжЁЯЗ╣','Jordania':'ЁЯЗпЁЯЗ┤','Portugal':'ЁЯЗ╡ЁЯЗ╣','RD Congo':'ЁЯЗиЁЯЗй','DR Congo':'ЁЯЗиЁЯЗй','Uzbekist├бn':'ЁЯЗ║ЁЯЗ┐','Colombia':'ЁЯЗиЁЯЗ┤','Inglaterra':'ЁЯП┤','England':'ЁЯП┤','Croacia':'ЁЯЗнЁЯЗ╖','Croatia':'ЁЯЗнЁЯЗ╖','Ghana':'ЁЯЗмЁЯЗн','Panam├б':'ЁЯЗ╡ЁЯЗж'};
let games=[],tables={};const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function flag(t){return FLAGS[t]||'ЁЯП│я╕П'}
function parseScore(score){const m=String(score||'').match(/(\d+)\s*-\s*(\d+)/);return m?[Number(m[1]),Number(m[2])]:null}
function penaltyHTML(g){return g?.penalties?`<div class="match-date"><strong>Penales: ${esc(g.penalties)}</strong></div>`:''}
function initTeam(name){return{team:name,pts:0,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0}}
function sourceDateTime(g){const time=g.time||'00:00';return new Date(`${g.date}T${time}:00-06:00`)}
function fmtDate(g){return g?.date?sourceDateTime(g).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}):'Por definir'}
function fmtTime(g){return g?.time?sourceDateTime(g).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'--:--'}
function teamSpanish(t){const map={'Brazil':'Brasil','Japan':'Jap├│n','Germany':'Alemania','Netherlands':'Pa├нses Bajos','Morocco':'Marruecos','Ivory Coast':'Costa de Marfil',"C├┤te d'Ivoire":'Costa de Marfil','Norway':'Noruega','Mexico':'M├йxico','England':'Inglaterra','DR Congo':'RD Congo','Switzerland':'Suiza','Egypt':'Egipto','Cape Verde':'Cabo Verde','South Africa':'Sud├бfrica','Canada':'Canad├б','United States':'Estados Unidos','Bosnia and Herzegovina':'Bosnia y Herzegovina','Spain':'Espa├▒a','Croatia':'Croacia','Algeria':'Argelia','France':'Francia','Sweden':'Suecia','Belgium':'B├йlgica'};return map[String(t||'')]||String(t||'')}
function translatePlaceholder(v){
  let text=String(v||'Por definir');
  text=text.replace(/TBD/gi,'Por definir');
  // Patrones con n├║mero intercalado (ej: "Round of 32 4 Winner")
  text=text.replace(/Round of 32 \d+ Winner/gi,'Ganador 32avos');
  text=text.replace(/Round of 32 \d+ Loser/gi,'Perdedor 32avos');
  text=text.replace(/Round of 16 \d+ Winner/gi,'Ganador Octavos');
  text=text.replace(/Round of 16 \d+ Loser/gi,'Perdedor Octavos');
  text=text.replace(/Quarterfinal \d+ Winner/gi,'Ganador Cuartos');
  text=text.replace(/Quarterfinal \d+ Loser/gi,'Perdedor Cuartos');
  text=text.replace(/Semifinal \d+ Winner/gi,'Ganador Semifinal');
  text=text.replace(/Semifinal \d+ Loser/gi,'Perdedor Semifinal');
  // Patrones sin n├║mero (fallback)
  text=text.replace(/Round of 32 Winner/gi,'Ganador 32avos');
  text=text.replace(/Round of 32 Loser/gi,'Perdedor 32avos');
  text=text.replace(/Round of 16 Winner/gi,'Ganador Octavos');
  text=text.replace(/Round of 16 Loser/gi,'Perdedor Octavos');
  text=text.replace(/Quarterfinal Winner/gi,'Ganador Cuartos');
  text=text.replace(/Quarterfinal Loser/gi,'Perdedor Cuartos');
  text=text.replace(/Semifinal 1 Winner/gi,'Ganador Semifinal 1');
  text=text.replace(/Semifinal 2 Winner/gi,'Ganador Semifinal 2');
  text=text.replace(/Semifinal 1 Loser/gi,'Perdedor Semifinal 1');
  text=text.replace(/Semifinal 2 Loser/gi,'Perdedor Semifinal 2');
  text=text.replace(/Winner of/gi,'Ganador');
  text=text.replace(/Loser of/gi,'Perdedor');
  return text;
}
function isPlaceholder(v){return /Grupo|Ganador|Perdedor|Round of|Quarterfinal|Semifinal|Winner|Loser|TBD|^\d[A-L]$/.test(String(v||''))}
function sideScore(g,index){const s=parseScore(g.score);return s?s[index]:''}
function winnerIndex(g){
  const s=parseScore(g.score);
  if(!s||String(g.status||'').toLowerCase()!=='final')return -1;
  if(s[0]!==s[1])return s[0]>s[1]?0:1;
  const p=parseScore(g.penalties);
  if(!p||p[0]===p[1])return -1;
  return p[0]>p[1]?0:1;
}

// FIX: Usar id directamente para partidos KO (P73, P74, ... P104)
// El bug original era que matchNum le├нa g.notes primero,
// y P89 tiene "P77" en sus notes тЖТ matchByNum(89) devolv├нa undefined.
function matchNum(g){
  const id=String(g?.id||'');
  // Si el id ya es formato "P\d+", usarlo directamente
  if(/^P\d+$/.test(id))return id;
  // Fallback: buscar en notes (para compatibilidad con otros formatos)
  return String(g?.notes||'').match(/P\d+/)?.[0]||id;
}
function matchByNum(n){
  // Primero buscar por id directo (m├бs confiable)
  return games.find(g=>g.id===`P${n}`)||games.find(g=>matchNum(g)===`P${n}`);
}

// FIX: Resolver "Ganador P77" тЖТ "Ganador Francia / Suecia" (o el ganador real si ya jugaron)
function resolveWinnerLabel(v){
  const m=String(v||'').match(/^Ganador\s+P(\d+)$/i);
  if(!m)return null;
  const src=matchByNum(Number(m[1]));
  if(!src)return`Ganador P${m[1]}`;
  const w=winnerIndex(src);
  if(w===0)return teamSpanish(src.team1);
  if(w===1)return teamSpanish(src.team2);
  // Partido no disputado a├║n: mostrar "Ganador Equipo1 / Equipo2"
  const t1=isPlaceholder(src.team1)?translatePlaceholder(src.team1):teamSpanish(src.team1);
  const t2=isPlaceholder(src.team2)?translatePlaceholder(src.team2):teamSpanish(src.team2);
  return`Ganador ${t1} / ${t2}`;
}

// FIX: labelTeam primero intenta resolver "Ganador PXX"
function labelTeam(v){
  const winner=resolveWinnerLabel(v);
  if(winner!==null)return esc(winner);
  if(isPlaceholder(v))return esc(translatePlaceholder(v));
  const name=teamSpanish(v);
  return`${flag(v)} ${esc(name)}`;
}

function matchCard(g,side='left'){
  if(!g)return'<article class="match"><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div></article>';
  const w=winnerIndex(g);
  return`<article class="match ${side==='right'?'right':''}"><div class="match-id">${esc(matchNum(g))}</div><div class="match-date"><span>${esc(String(g.status||'').toLowerCase()==='final'?'Finalizado':fmtDate(g))}</span><span>${esc(String(g.status||'').toLowerCase()==='final'?'':fmtTime(g))}</span></div><div class="side ${w===0?'winner':w===1?'loser':''}"><div class="side-team">${labelTeam(g.team1)}</div><div class="score">${esc(sideScore(g,0))}</div></div><div class="side ${w===1?'winner':w===0?'loser':''}"><div class="side-team">${labelTeam(g.team2)}</div><div class="score">${esc(sideScore(g,1))}</div></div>${penaltyHTML(g)}</article>`;
}
function placeTitle(text,col){return`<div class="round-title" style="grid-column:${col};grid-row:1">${esc(text)}</div>`}
function placeMatch(n,col,row,side='left',span=3){return`<div style="grid-column:${col};grid-row:${row}/span ${span}">${matchCard(matchByNum(n),side)}</div>`}
function renderBracket(){
  // P90 (Canad├б vs Marruecos) arriba en fila 3, P89 (Paraguay vs Ganador P77) abajo en fila 10
  const leftR32=[[73,2],[75,5],[74,9],[77,12],[83,17],[84,20],[81,24],[82,27]];
  const leftR16=[[90,3],[89,10],[93,18],[94,25]];
  const leftQF=[[97,7],[98,22]];
  const rightR32=[[76,2],[78,5],[79,9],[80,12],[86,17],[88,20],[85,24],[87,27]];
  const rightR16=[[91,3],[92,10],[95,18],[96,25]];
  const rightQF=[[99,7],[100,22]];
  $('bracketGrid').innerHTML=[
    placeTitle('Dieciseisavos de final',1),
    placeTitle('Octavos de final',2),
    placeTitle('Cuartos de final',3),
    placeTitle('Semifinal',4),
    placeTitle('Final',5),
    placeTitle('Semifinal',6),
    placeTitle('Cuartos de final',7),
    placeTitle('Octavos de final',8),
    placeTitle('Dieciseisavos de final',9),
    ...leftR32.map(x=>placeMatch(x[0],1,x[1],'left')),
    ...leftR16.map(x=>placeMatch(x[0],2,x[1],'left')),
    ...leftQF.map(x=>placeMatch(x[0],3,x[1],'left')),
    placeMatch(101,4,14,'left'),
    `<div style="grid-column:5;grid-row:10/span 4"><div class="center-title">Final</div>${matchCard(matchByNum(104),'left')}</div>`,
    `<div style="grid-column:5;grid-row:18/span 4"><div class="third-title">Partido por el tercer puesto</div>${matchCard(matchByNum(103),'left')}</div>`,
    placeMatch(102,6,14,'right'),
    ...rightQF.map(x=>placeMatch(x[0],7,x[1],'right')),
    ...rightR16.map(x=>placeMatch(x[0],8,x[1],'right')),
    ...rightR32.map(x=>placeMatch(x[0],9,x[1],'right'))
  ].join('');
}
async function loadData(){
  const res=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});
  const payload=await res.json();
  games=Array.isArray(payload)?payload:payload.games||[];
  $('lastUpdated').textContent=payload.updatedAt?new Date(payload.updatedAt).toLocaleString('es-MX'):'тАФ';
  renderBracket();
}
loadData().catch(e=>{console.error(e);document.querySelector('main').innerHTML='<div class="empty">No se pudo cargar informaci├│n.</div>'});
</script>
</body>
</html>
