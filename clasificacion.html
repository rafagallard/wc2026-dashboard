<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eliminatorias Mundial 2026</title>
  <style>
    :root{--mx:#006847;--us:#3c3b6e;--ca:#d80621;--ink:#111827;--muted:#64748b;--line:#d7deea;--dark:#0b1220;--good:#dcfce7;--warn:#fff7e6;--bad:#f1f5f9;--shadow:0 18px 45px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7f9;color:var(--ink)}
    header{position:relative;z-index:50;color:#fff;background:linear-gradient(120deg,rgba(0,104,71,.98),rgba(60,59,110,.96) 52%,rgba(216,6,33,.97));box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .hero{max-width:1720px;margin:auto;padding:18px 22px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.hero h1{font-size:clamp(24px,3vw,40px);letter-spacing:-.055em;margin:0;line-height:1}.sub{opacity:.88;margin-top:7px;font-size:14px}.statusbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill,.nav-link{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;white-space:nowrap;color:#fff;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.28)}
    main{max-width:1720px;margin:auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 18px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#dbe3f0;color:#24304a;font-weight:950;cursor:pointer}.tab.active{background:var(--dark);color:#fff}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:20px 0 12px}.section-title h2{margin:0;font-size:24px;letter-spacing:-.04em}.legend{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;font-weight:850}.legend span{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(390px,1fr));gap:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:14px 16px;color:#fff;background:linear-gradient(135deg,#101827,#31415f);display:flex;justify-content:space-between;gap:10px;align-items:center}.card-head h3{margin:0;font-size:20px;letter-spacing:-.035em}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:680px}th,td{padding:10px 11px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px}th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#fbfcff}td.num,th.num{text-align:center}.team{font-weight:1000;white-space:nowrap}.rank{font-weight:1000;color:#475569}.direct{background:var(--good)}.third{background:var(--warn)}.out{background:var(--bad);color:#475569}.status{font-size:11px;font-weight:1000;border-radius:999px;padding:5px 8px;display:inline-block}.status.direct{color:#166534}.status.third{color:#92400e}.status.out{color:#475569}
    .bracket-shell{overflow-x:auto;border:1px solid var(--line);background:#f8fafc;border-radius:22px;box-shadow:var(--shadow);padding:14px}.bracket{min-width:1680px;display:grid;grid-template-columns:170px 155px 155px 155px 210px 155px 155px 155px 170px;grid-template-rows:32px repeat(28,32px);gap:6px 14px;position:relative}.round-title{text-align:center;color:#30415f;font-size:14px;font-weight:900;align-self:center}.match{position:relative;background:#fff;border:1px solid #b9c3d2;border-radius:8px;padding:6px 8px;box-shadow:0 3px 8px rgba(15,23,42,.05);align-self:center}.match-id{position:absolute;left:-36px;top:34px;font-size:12px;color:#000;text-decoration:underline;font-weight:850}.right .match-id{left:auto;right:-36px}.match-date{display:flex;justify-content:space-between;gap:8px;color:#334155;font-size:12px;margin-bottom:6px}.side{height:31px;display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;border:1px solid #d6dce7;border-radius:6px;padding:5px 7px;margin:4px 0;background:#fff}.side-team{font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:13px;font-weight:1000}.winner{font-weight:1000}.winner .side-team,.winner .score{color:#111827}.winner:after{content:"";position:absolute;right:8px;bottom:5px;width:28px;border-bottom:2px solid #22c55e}.loser{color:#64748b}.connector{position:relative}.connector:after{content:"";position:absolute;top:50%;left:-14px;right:-14px;border-top:1px solid #c8d0dc}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:26px;color:var(--muted);text-align:center}.footer{padding:24px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:760px){main{padding:12px}.hero{grid-template-columns:1fr}.statusbar{justify-content:flex-start}.grid{grid-template-columns:1fr}table{min-width:620px}.bracket{min-width:1500px}}
  </style>
</head>
<body>
<header><div class="hero"><div><h1>Eliminatorias Mundial 2026</h1><div class="sub">Bracket del torneo</div></div><div class="statusbar"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="predicciones.html">Predicciones</a><div class="pill">Datos: <span id="lastUpdated">тАФ</span></div></div></div></header>
<main>
  <section id="knockoutView"><div class="section-title"><h2>Eliminatorias</h2></div><div class="bracket-shell"><div id="bracketGrid" class="bracket"></div></div></section>
</main>
<div class="footer">┬й 2026 Camu ┬╖ Todos los derechos reservados</div>
<script>
const DATA_URL='./worldcup_results.json';
const GROUPS='ABCDEFGHIJKL'.split('');
const FLAGS={'M├йxico':'ЁЯЗ▓ЁЯЗ╜','Mexico':'ЁЯЗ▓ЁЯЗ╜','Sud├бfrica':'ЁЯЗ┐ЁЯЗж','South Africa':'ЁЯЗ┐ЁЯЗж','Corea del Sur':'ЁЯЗ░ЁЯЗ╖','Korea Republic':'ЁЯЗ░ЁЯЗ╖','Chequia':'ЁЯЗиЁЯЗ┐','Czechia':'ЁЯЗиЁЯЗ┐','Canad├б':'ЁЯЗиЁЯЗж','Canada':'ЁЯЗиЁЯЗж','Bosnia y Herzegovina':'ЁЯЗзЁЯЗж','Bosnia and Herzegovina':'ЁЯЗзЁЯЗж','Qatar':'ЁЯЗ╢ЁЯЗж','Suiza':'ЁЯЗиЁЯЗн','Switzerland':'ЁЯЗиЁЯЗн','Estados Unidos':'ЁЯЗ║ЁЯЗ╕','United States':'ЁЯЗ║ЁЯЗ╕','Paraguay':'ЁЯЗ╡ЁЯЗ╛','Australia':'ЁЯЗжЁЯЗ║','Turqu├нa':'ЁЯЗ╣ЁЯЗ╖','Brasil':'ЁЯЗзЁЯЗ╖','Brazil':'ЁЯЗзЁЯЗ╖','Marruecos':'ЁЯЗ▓ЁЯЗж','Morocco':'ЁЯЗ▓ЁЯЗж','Hait├н':'ЁЯЗнЁЯЗ╣','Escocia':'ЁЯП┤','Alemania':'ЁЯЗйЁЯЗк','Germany':'ЁЯЗйЁЯЗк','Curazao':'ЁЯЗиЁЯЗ╝','Costa de Marfil':'ЁЯЗиЁЯЗо','Ivory Coast':'ЁЯЗиЁЯЗо','C├┤te dтАЩIvoire':'ЁЯЗиЁЯЗо','C├┤te d\'Ivoire':'ЁЯЗиЁЯЗо','Ecuador':'ЁЯЗкЁЯЗи','Pa├нses Bajos':'ЁЯЗ│ЁЯЗ▒','Netherlands':'ЁЯЗ│ЁЯЗ▒','Jap├│n':'ЁЯЗпЁЯЗ╡','Japan':'ЁЯЗпЁЯЗ╡','Suecia':'ЁЯЗ╕ЁЯЗк','Sweden':'ЁЯЗ╕ЁЯЗк','T├║nez':'ЁЯЗ╣ЁЯЗ│','B├йlgica':'ЁЯЗзЁЯЗк','Belgium':'ЁЯЗзЁЯЗк','Egipto':'ЁЯЗкЁЯЗм','Egypt':'ЁЯЗкЁЯЗм','Ir├бn':'ЁЯЗоЁЯЗ╖','Nueva Zelanda':'ЁЯЗ│ЁЯЗ┐','Espa├▒a':'ЁЯЗкЁЯЗ╕','Spain':'ЁЯЗкЁЯЗ╕','Cabo Verde':'ЁЯЗиЁЯЗ╗','Cape Verde':'ЁЯЗиЁЯЗ╗','Arabia Saudita':'ЁЯЗ╕ЁЯЗж','Uruguay':'ЁЯЗ║ЁЯЗ╛','Francia':'ЁЯЗлЁЯЗ╖','France':'ЁЯЗлЁЯЗ╖','Senegal':'ЁЯЗ╕ЁЯЗ│','Irak':'ЁЯЗоЁЯЗ╢','Noruega':'ЁЯЗ│ЁЯЗ┤','Norway':'ЁЯЗ│ЁЯЗ┤','Argentina':'ЁЯЗжЁЯЗ╖','Argelia':'ЁЯЗйЁЯЗ┐','Algeria':'ЁЯЗйЁЯЗ┐','Austria':'ЁЯЗжЁЯЗ╣','Jordania':'ЁЯЗпЁЯЗ┤','Portugal':'ЁЯЗ╡ЁЯЗ╣','RD Congo':'ЁЯЗиЁЯЗй','DR Congo':'ЁЯЗиЁЯЗй','Uzbekist├бn':'ЁЯЗ║ЁЯЗ┐','Colombia':'ЁЯЗиЁЯЗ┤','Inglaterra':'ЁЯП┤','England':'ЁЯП┤','Croacia':'ЁЯЗнЁЯЗ╖','Croatia':'ЁЯЗнЁЯЗ╖','Ghana':'ЁЯЗмЁЯЗн','Panam├б':'ЁЯЗ╡ЁЯЗж'};
let games=[],tables={};const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function flag(t){return FLAGS[t]||'ЁЯП│я╕П'}
function parseScore(score){const m=String(score||'').match(/(\d+)\s*-\s*(\d+)/);return m?[Number(m[1]),Number(m[2])]:null}
function initTeam(name){return{team:name,pts:0,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0}}
function sourceDateTime(g){const time=g.time||'00:00';return new Date(`${g.date}T${time}:00-06:00`)}
function fmtDate(g){return g?.date?sourceDateTime(g).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}):'Por definir'}
function fmtTime(g){return g?.time?sourceDateTime(g).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'--:--'}
function teamSpanish(t){const map={'Brazil':'Brasil','Japan':'Jap├│n','Germany':'Alemania','Netherlands':'Pa├нses Bajos','Morocco':'Marruecos','Ivory Coast':'Costa de Marfil','C├┤te dтАЩIvoire':'Costa de Marfil',"C├┤te d'Ivoire":'Costa de Marfil','Norway':'Noruega','Mexico':'M├йxico','England':'Inglaterra','DR Congo':'RD Congo','Switzerland':'Suiza','Egypt':'Egipto','Cape Verde':'Cabo Verde','South Africa':'Sud├бfrica','Canada':'Canad├б','United States':'Estados Unidos','Bosnia and Herzegovina':'Bosnia y Herzegovina','Spain':'Espa├▒a','Croatia':'Croacia','Algeria':'Argelia','France':'Francia','Sweden':'Suecia','Belgium':'B├йlgica'};return map[String(t||'')]||String(t||'')}
function translatePlaceholder(v){let text=String(v||'Por definir');text=text.replace(/TBD/gi,'Por definir');text=text.replace(/Round of 32 Winner/gi,'Ganador 32avos');text=text.replace(/Round of 32 Loser/gi,'Perdedor 32avos');text=text.replace(/Round of 16 Winner/gi,'Ganador octavos');text=text.replace(/Round of 16 Loser/gi,'Perdedor octavos');text=text.replace(/Quarterfinal Winner/gi,'Ganador cuartos');text=text.replace(/Quarterfinal Loser/gi,'Perdedor cuartos');text=text.replace(/Semifinal 1 Winner/gi,'Ganador semifinal 1');text=text.replace(/Semifinal 2 Winner/gi,'Ganador semifinal 2');text=text.replace(/Semifinal 1 Loser/gi,'Perdedor semifinal 1');text=text.replace(/Semifinal 2 Loser/gi,'Perdedor semifinal 2');text=text.replace(/Winner of/gi,'Ganador');text=text.replace(/Loser of/gi,'Perdedor');return text}
function buildTables(){const map={};games.filter(g=>g.group&&g.group!=='KO').forEach(g=>{map[g.group]=map[g.group]||{};[g.team1,g.team2].forEach(t=>{if(t&&!map[g.group][t])map[g.group][t]=initTeam(t)});if(String(g.status||'').toLowerCase()==='final'){const s=parseScore(g.score);if(!s)return;const a=map[g.group][g.team1],b=map[g.group][g.team2];a.pj++;b.pj++;a.gf+=s[0];a.gc+=s[1];b.gf+=s[1];b.gc+=s[0];if(s[0]>s[1]){a.g++;b.p++;a.pts+=3}else if(s[0]<s[1]){b.g++;a.p++;b.pts+=3}else{a.e++;b.e++;a.pts++;b.pts++}a.dg=a.gf-a.gc;b.dg=b.gf-b.gc}});tables={};GROUPS.forEach(gr=>{tables[gr]=Object.values(map[gr]||{}).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es')).map((t,i)=>({...t,group:gr,pos:i+1}))})}
function groupsComplete(){return GROUPS.every(g=>games.filter(x=>x.group===g).length&&games.filter(x=>x.group===g).every(x=>String(x.status||'').toLowerCase()==='final'))}
function thirdRankSet(){const thirds=GROUPS.map(g=>tables[g]?.[2]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es')).slice(0,8);return new Set(thirds.map(t=>t.team))}
function rowClass(t,bestThirds,allDone){if(t.pos<=2)return'direct';if(t.pos===3)return(!allDone||bestThirds.has(t.team))?'third':'out';return'out'}
function statusLabel(t,bestThirds,allDone){if(t.pos<=2)return'Clasificado';if(t.pos===3)return allDone?(bestThirds.has(t.team)?'Mejor 3┬║':'Eliminado'):'3┬║ pendiente';return'Eliminado'}
function renderGroups(){const allDone=groupsComplete(),bestThirds=thirdRankSet();$('groupsGrid').innerHTML=GROUPS.map(g=>`<section class="card"><div class="card-head"><h3>Grupo ${g}</h3><span>${tables[g]?.length||0} equipos</span></div><div class="table-wrap"><table><thead><tr><th class="num">#</th><th>Equipo</th><th class="num">PJ</th><th class="num">G</th><th class="num">E</th><th class="num">P</th><th class="num">GF</th><th class="num">GC</th><th class="num">DG</th><th class="num">PTS</th><th>Estado</th></tr></thead><tbody>${(tables[g]||[]).map(t=>{const cls=rowClass(t,bestThirds,allDone);return`<tr class="${cls}"><td class="num rank">${t.pos}</td><td class="team">${flag(t.team)} ${esc(teamSpanish(t.team))}</td><td class="num">${t.pj}</td><td class="num">${t.g}</td><td class="num">${t.e}</td><td class="num">${t.p}</td><td class="num">${t.gf}</td><td class="num">${t.gc}</td><td class="num">${t.dg}</td><td class="num"><strong>${t.pts}</strong></td><td><span class="status ${cls}">${statusLabel(t,bestThirds,allDone)}</span></td></tr>`}).join('')}</tbody></table></div></section>`).join('')}
function isPlaceholder(v){return /Grupo|Ganador|Perdedor|Round of|Quarterfinal|Semifinal|Winner|Loser|TBD|^\d[A-L]$/.test(String(v||''))}
function labelTeam(v){if(isPlaceholder(v))return esc(translatePlaceholder(v));const name=teamSpanish(v);return `${flag(v)} ${esc(name)}`}
function sideScore(g,index){const s=parseScore(g.score);return s?s[index]:''}
function winnerIndex(g){const s=parseScore(g.score);if(!s||String(g.status||'').toLowerCase()!=='final'||s[0]===s[1])return -1;return s[0]>s[1]?0:1}
function matchNum(g){return String(g?.notes||g?.id||'').match(/P\d+/)?.[0]||String(g?.id||'')}
function matchByNum(n){return games.find(g=>matchNum(g)===`P${n}`)}
function matchCard(g,side='left'){if(!g)return'<article class="match"><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div></article>';const w=winnerIndex(g);return`<article class="match ${side==='right'?'right':''}"><div class="match-id">${esc(matchNum(g))}</div><div class="match-date"><span>${esc(String(g.status||'').toLowerCase()==='final'?'Finalizado':fmtDate(g))}</span><span>${esc(String(g.status||'').toLowerCase()==='final'?'':fmtTime(g))}</span></div><div class="side ${w===0?'winner':w===1?'loser':''}"><div class="side-team">${labelTeam(g.team1)}</div><div class="score">${esc(sideScore(g,0))}</div></div><div class="side ${w===1?'winner':w===0?'loser':''}"><div class="side-team">${labelTeam(g.team2)}</div><div class="score">${esc(sideScore(g,1))}</div></div></article>`}
function placeTitle(text,col){return`<div class="round-title" style="grid-column:${col};grid-row:1">${esc(text)}</div>`}
function placeMatch(n,col,row,side='left',span=3){return`<div style="grid-column:${col};grid-row:${row}/span ${span}">${matchCard(matchByNum(n),side)}</div>`}
function renderBracket(){const leftR32=[[73,2],[75,5],[74,9],[77,12],[83,17],[84,20],[81,24],[82,27]],leftR16=[[89,3],[90,10],[93,18],[94,25]],leftQF=[[97,7],[98,22]],rightR32=[[76,2],[78,5],[79,9],[80,12],[86,17],[88,20],[85,24],[87,27]],rightR16=[[91,3],[92,10],[95,18],[96,25]],rightQF=[[99,7],[100,22]];$('bracketGrid').innerHTML=[placeTitle('Dieciseisavos de final',1),placeTitle('Octavos de final',2),placeTitle('Cuartos de final',3),placeTitle('Semifinal',4),placeTitle('Final',5),placeTitle('Semifinal',6),placeTitle('Cuartos de final',7),placeTitle('Octavos de final',8),placeTitle('Dieciseisavos de final',9),...leftR32.map(x=>placeMatch(x[0],1,x[1],'left')),...leftR16.map(x=>placeMatch(x[0],2,x[1],'left')),...leftQF.map(x=>placeMatch(x[0],3,x[1],'left')),placeMatch(101,4,14,'left'),`<div style="grid-column:5;grid-row:10/span 4"><div class="center-title">Final</div>${matchCard(matchByNum(104),'left')}</div>`,`<div style="grid-column:5;grid-row:18/span 4"><div class="third-title">Partido por el tercer puesto</div>${matchCard(matchByNum(103),'left')}</div>`,placeMatch(102,6,14,'right'),...rightQF.map(x=>placeMatch(x[0],7,x[1],'right')),...rightR16.map(x=>placeMatch(x[0],8,x[1],'right')),...rightR32.map(x=>placeMatch(x[0],9,x[1],'right'))].join('')}
function setupTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));$('groupsView').style.display=btn.dataset.view==='groups'?'block':'none';$('knockoutView').style.display=btn.dataset.view==='knockout'?'block':'none'}))}
async function loadData(){const res=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});const payload=await res.json();games=Array.isArray(payload)?payload:payload.games||[];$('lastUpdated').textContent=payload.updatedAt?new Date(payload.updatedAt).toLocaleString('es-MX'):'тАФ';renderBracket()}
loadData().catch(e=>{console.error(e);document.querySelector('main').innerHTML='<div class="empty">No se pudo cargar informaci├│n.</div>'});
</script>
</body>
</html>
