<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clasificación Mundial 2026</title>
  <style>
    :root{--mx:#006847;--us:#3c3b6e;--ca:#d80621;--ink:#111827;--muted:#64748b;--line:#d7deea;--dark:#0b1220;--good:#dcfce7;--warn:#fff7e6;--bad:#f1f5f9;--shadow:0 18px 45px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7f9;color:var(--ink)}
    header{position:relative;z-index:50;color:#fff;background:linear-gradient(120deg,rgba(0,104,71,.98),rgba(60,59,110,.96) 52%,rgba(216,6,33,.97));box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .hero{max-width:1720px;margin:auto;padding:18px 22px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.hero h1{font-size:clamp(24px,3vw,40px);letter-spacing:-.055em;margin:0;line-height:1}.sub{opacity:.88;margin-top:7px;font-size:14px}.statusbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill,.nav-link{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;white-space:nowrap;color:#fff;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.28)}
    main{max-width:1720px;margin:auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 18px}.tab{border:0;border-radius:999px;padding:10px 14px;background:#dbe3f0;color:#24304a;font-weight:950;cursor:pointer}.tab.active{background:var(--dark);color:#fff}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:20px 0 12px}.section-title h2{margin:0;font-size:24px;letter-spacing:-.04em}.legend{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;font-weight:850}.legend span{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(390px,1fr));gap:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:14px 16px;color:#fff;background:linear-gradient(135deg,#101827,#31415f);display:flex;justify-content:space-between;gap:10px;align-items:center}.card-head h3{margin:0;font-size:20px;letter-spacing:-.035em}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:680px}th,td{padding:10px 11px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px}th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#fbfcff}td.num,th.num{text-align:center}.team{font-weight:1000;white-space:nowrap}.rank{font-weight:1000;color:#475569}.direct{background:var(--good)}.third{background:var(--warn)}.out{background:var(--bad);color:#475569}.status{font-size:11px;font-weight:1000;border-radius:999px;padding:5px 8px;display:inline-block}.status.direct{color:#166534}.status.third{color:#92400e}.status.out{color:#475569}
    .bracket-shell{overflow-x:auto;border:1px solid var(--line);background:#f8fafc;border-radius:22px;box-shadow:var(--shadow);padding-top:12px}.bracket{min-width:1680px;padding:18px 18px 28px;display:grid;grid-template-columns:170px 150px 150px 150px 190px 150px 150px 150px 170px;gap:14px;align-items:stretch}.round{position:relative;display:grid;align-content:start;gap:10px}.round-title{text-align:center;color:#30415f;font-size:14px;font-weight:850;margin-bottom:28px}.round.left .match:after{content:"";position:absolute;right:-14px;top:50%;width:14px;border-top:1px solid #c8d0dc}.round.right .match:before{content:"";position:absolute;left:-14px;top:50%;width:14px;border-top:1px solid #c8d0dc}.round.r16,.round.r16r{padding-top:74px;gap:32px}.round.qf,.round.qfr{padding-top:184px;gap:122px}.round.sf,.round.sfr{padding-top:324px;gap:0}.center{display:grid;align-content:center;gap:20px}.center-title{text-align:center;color:#30415f;font-size:18px;font-weight:700}.third-title{text-align:center;color:#30415f;font-size:17px;font-weight:700;margin-top:6px}.match{position:relative;background:#fff;border:1px solid #b9c3d2;border-radius:8px;min-height:78px;padding:6px 8px;box-shadow:0 3px 8px rgba(15,23,42,.05)}.match.final{min-height:106px}.match-id{position:absolute;left:-38px;top:34px;font-size:12px;color:#000;text-decoration:underline;font-weight:850}.round.right .match-id{left:auto;right:-38px}.match-date{display:flex;justify-content:space-between;gap:8px;color:#334155;font-size:12px;margin-bottom:6px}.side{height:33px;display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;border:1px solid #d6dce7;border-radius:6px;padding:5px 7px;margin:4px 0;background:#fff}.side-team{font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:13px;font-weight:1000}.winner{font-weight:1000}.winner .side-team,.winner .score{color:#111827}.winner:after{content:"";position:absolute;right:8px;bottom:5px;width:28px;border-bottom:2px solid #22c55e}.loser{color:#64748b}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:26px;color:var(--muted);text-align:center}.footer{padding:24px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:760px){main{padding:12px}.hero{grid-template-columns:1fr}.statusbar{justify-content:flex-start}.grid{grid-template-columns:1fr}table{min-width:620px}.bracket{min-width:1500px}}
  </style>
</head>
<body>
<header><div class="hero"><div><h1>Clasificación Mundial 2026</h1><div class="sub">Tablas y eliminatorias</div></div><div class="statusbar"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="predicciones.html">Predicciones</a><div class="pill">Datos: <span id="lastUpdated">—</span></div></div></div></header>
<main>
  <section class="tabs"><button class="tab active" data-view="groups">Clasificación</button><button class="tab" data-view="knockout">Eliminatorias</button></section>
  <section id="groupsView"><div class="section-title"><h2>Clasificación por grupos</h2><div class="legend"><span>Verde: clasifica directo</span><span>Amarillo: mejores terceros</span><span>Gris: eliminado</span></div></div><div id="groupsGrid" class="grid"></div></section>
  <section id="knockoutView" style="display:none"><div class="section-title"><h2>Eliminatorias</h2></div><div class="bracket-shell"><div id="bracketGrid" class="bracket"></div></div></section>
</main>
<div class="footer">© 2026 Camu · Todos los derechos reservados</div>
<script>
const DATA_URL='./worldcup_results.json';
const GROUPS='ABCDEFGHIJKL'.split('');
const FLAGS={'México':'🇲🇽','Sudáfrica':'🇿🇦','Corea del Sur':'🇰🇷','Korea Republic':'🇰🇷','Chequia':'🇨🇿','Czechia':'🇨🇿','Canadá':'🇨🇦','Bosnia y Herzegovina':'🇧🇦','Qatar':'🇶🇦','Suiza':'🇨🇭','Estados Unidos':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turquía':'🇹🇷','Brasil':'🇧🇷','Marruecos':'🇲🇦','Haití':'🇭🇹','Escocia':'🏴','Alemania':'🇩🇪','Curazao':'🇨🇼','Costa de Marfil':'🇨🇮','Côte d’Ivoire':'🇨🇮','Côte d\'Ivoire':'🇨🇮','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨','Países Bajos':'🇳🇱','Netherlands':'🇳🇱','Japón':'🇯🇵','Japan':'🇯🇵','Suecia':'🇸🇪','Túnez':'🇹🇳','Bélgica':'🇧🇪','Egipto':'🇪🇬','Irán':'🇮🇷','Nueva Zelanda':'🇳🇿','España':'🇪🇸','Cabo Verde':'🇨🇻','Arabia Saudita':'🇸🇦','Uruguay':'🇺🇾','Francia':'🇫🇷','Senegal':'🇸🇳','Irak':'🇮🇶','Noruega':'🇳🇴','Argentina':'🇦🇷','Argelia':'🇩🇿','Austria':'🇦🇹','Jordania':'🇯🇴','Portugal':'🇵🇹','RD Congo':'🇨🇩','DR Congo':'🇨🇩','Uzbekistán':'🇺🇿','Colombia':'🇨🇴','Inglaterra':'🏴','England':'🏴','Croacia':'🇭🇷','Ghana':'🇬🇭','Panamá':'🇵🇦'};
let games=[],tables={};const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function flag(t){return FLAGS[t]||'🏳️'}
function parseScore(score){const m=String(score||'').match(/(\d+)\s*-\s*(\d+)/);return m?[Number(m[1]),Number(m[2])]:null}
function initTeam(name){return{team:name,pts:0,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0}}
function sourceDateTime(g){const time=g.time||'00:00';return new Date(`${g.date}T${time}:00-06:00`)}
function fmtDate(g){return g?.date?sourceDateTime(g).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}):'Por definir'}
function fmtTime(g){return g?.time?sourceDateTime(g).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'--:--'}
function teamSpanish(t){const map={'Brazil':'Brasil','Japan':'Japón','Germany':'Alemania','Netherlands':'Países Bajos','Morocco':'Marruecos','Ivory Coast':'Costa de Marfil','Côte d’Ivoire':'Costa de Marfil',"Côte d'Ivoire":'Costa de Marfil','Norway':'Noruega','Mexico':'México','England':'Inglaterra','DR Congo':'RD Congo','Switzerland':'Suiza','Australia':'Australia','Egypt':'Egipto','Argentina':'Argentina','Cape Verde':'Cabo Verde','South Africa':'Sudáfrica','Canada':'Canadá','United States':'Estados Unidos','Bosnia and Herzegovina':'Bosnia y Herzegovina','Spain':'España','Austria':'Austria','Portugal':'Portugal','Croatia':'Croacia','Algeria':'Argelia','Colombia':'Colombia','Ghana':'Ghana','France':'Francia','Sweden':'Suecia','Belgium':'Bélgica','Senegal':'Senegal'};return map[String(t||'')]||String(t||'')}
function shortName(t){return teamSpanish(t).replace('Estados Unidos','EE. UU.').replace('Corea del Sur','Corea del Sur').replace('Costa de Marfil','Costa de Marfil').replace('Países Bajos','Países Bajos').replace('Arabia Saudita','Arabia Saudita').replace('Nueva Zelanda','Nueva Zelanda')}
function translatePlaceholder(v){let text=String(v||'Por definir');text=text.replace(/TBD/gi,'Por definir');text=text.replace(/Round of 32 Winner/gi,'Ganador 32avos');text=text.replace(/Round of 32 Loser/gi,'Perdedor 32avos');text=text.replace(/Round of 16 Winner/gi,'Ganador octavos');text=text.replace(/Round of 16 Loser/gi,'Perdedor octavos');text=text.replace(/Quarterfinal Winner/gi,'Ganador cuartos');text=text.replace(/Quarterfinal Loser/gi,'Perdedor cuartos');text=text.replace(/Semifinal 1 Winner/gi,'Ganador semifinal 1');text=text.replace(/Semifinal 2 Winner/gi,'Ganador semifinal 2');text=text.replace(/Semifinal 1 Loser/gi,'Perdedor semifinal 1');text=text.replace(/Semifinal 2 Loser/gi,'Perdedor semifinal 2');text=text.replace(/Winner of/gi,'Ganador');text=text.replace(/Loser of/gi,'Perdedor');return text}
function buildTables(){const map={};games.filter(g=>g.group&&g.group!=='KO').forEach(g=>{map[g.group]=map[g.group]||{};[g.team1,g.team2].forEach(t=>{if(t&&!map[g.group][t])map[g.group][t]=initTeam(t)});if(String(g.status||'').toLowerCase()==='final'){const s=parseScore(g.score);if(!s)return;const a=map[g.group][g.team1],b=map[g.group][g.team2];a.pj++;b.pj++;a.gf+=s[0];a.gc+=s[1];b.gf+=s[1];b.gc+=s[0];if(s[0]>s[1]){a.g++;b.p++;a.pts+=3}else if(s[0]<s[1]){b.g++;a.p++;b.pts+=3}else{a.e++;b.e++;a.pts++;b.pts++}a.dg=a.gf-a.gc;b.dg=b.gf-b.gc}});tables={};GROUPS.forEach(gr=>{tables[gr]=Object.values(map[gr]||{}).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es')).map((t,i)=>({...t,group:gr,pos:i+1}))})}
function groupsComplete(){return GROUPS.every(g=>games.filter(x=>x.group===g).length&&games.filter(x=>x.group===g).every(x=>String(x.status||'').toLowerCase()==='final'))}
function thirdRankSet(){const thirds=GROUPS.map(g=>tables[g]?.[2]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.team.localeCompare(b.team,'es')).slice(0,8);return new Set(thirds.map(t=>t.team))}
function rowClass(t,bestThirds,allDone){if(t.pos<=2)return'direct';if(t.pos===3)return(!allDone||bestThirds.has(t.team))?'third':'out';return'out'}
function statusLabel(t,bestThirds,allDone){if(t.pos<=2)return'Clasificado';if(t.pos===3)return allDone?(bestThirds.has(t.team)?'Mejor 3º':'Eliminado'):'3º pendiente';return'Eliminado'}
function renderGroups(){const allDone=groupsComplete(),bestThirds=thirdRankSet();$('groupsGrid').innerHTML=GROUPS.map(g=>`<section class="card"><div class="card-head"><h3>Grupo ${g}</h3><span>${tables[g]?.length||0} equipos</span></div><div class="table-wrap"><table><thead><tr><th class="num">#</th><th>Equipo</th><th class="num">PJ</th><th class="num">G</th><th class="num">E</th><th class="num">P</th><th class="num">GF</th><th class="num">GC</th><th class="num">DG</th><th class="num">PTS</th><th>Estado</th></tr></thead><tbody>${(tables[g]||[]).map(t=>{const cls=rowClass(t,bestThirds,allDone);return`<tr class="${cls}"><td class="num rank">${t.pos}</td><td class="team">${flag(t.team)} ${esc(teamSpanish(t.team))}</td><td class="num">${t.pj}</td><td class="num">${t.g}</td><td class="num">${t.e}</td><td class="num">${t.p}</td><td class="num">${t.gf}</td><td class="num">${t.gc}</td><td class="num">${t.dg}</td><td class="num"><strong>${t.pts}</strong></td><td><span class="status ${cls}">${statusLabel(t,bestThirds,allDone)}</span></td></tr>`}).join('')}</tbody></table></div></section>`).join('')}
function isPlaceholder(v){return /Grupo|Ganador|Perdedor|Round of|Quarterfinal|Semifinal|Winner|Loser|TBD|^\d[A-L]$/.test(String(v||''))}
function labelTeam(v){if(isPlaceholder(v))return esc(translatePlaceholder(v));const name=teamSpanish(v);return `${flag(v)} ${esc(shortName(name))}`}
function sideScore(g,index){const s=parseScore(g.score);return s?s[index]:''}
function winnerIndex(g){const s=parseScore(g.score);if(!s||String(g.status||'').toLowerCase()!=='final'||s[0]===s[1])return -1;return s[0]>s[1]?0:1}
function matchNum(g){return String(g.notes||g.id||'').match(/P\d+/)?.[0]||String(g.id||'')}
function matchCard(g,side='left',isFinal=false){if(!g)return'<div class="match"><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div><div class="side"><div class="side-team">Por definir</div><div class="score"></div></div></div>';const w=winnerIndex(g);return`<article class="match ${isFinal?'final':''}"><div class="match-id">${esc(matchNum(g))}</div><div class="match-date"><span>${esc(String(g.status||'').toLowerCase()==='final'?'Finalizado':fmtDate(g))}</span><span>${esc(String(g.status||'').toLowerCase()==='final'?'':fmtTime(g))}</span></div><div class="side ${w===0?'winner':w===1?'loser':''}"><div class="side-team">${labelTeam(g.team1)}</div><div class="score">${esc(sideScore(g,0))}</div></div><div class="side ${w===1?'winner':w===0?'loser':''}"><div class="side-team">${labelTeam(g.team2)}</div><div class="score">${esc(sideScore(g,1))}</div></div></article>`}
function phaseList(stage){return games.filter(g=>g.stage===stage).sort((a,b)=>sourceDateTime(a)-sourceDateTime(b))}
function renderRound(title,items,cls,side){return`<section class="round ${side} ${cls}"><div class="round-title">${esc(title)}</div>${items.map(g=>matchCard(g,side)).join('')}</section>`}
function renderBracket(){const r32=phaseList('32avos de final'),r16=phaseList('Octavos de final'),qf=phaseList('Cuartos de final'),sf=phaseList('Semifinal'),third=phaseList('Tercer lugar'),final=phaseList('Final');$('bracketGrid').innerHTML=`${renderRound('Dieciseisavos de final',r32.slice(0,8),'r32','left')}${renderRound('Octavos de final',r16.slice(0,4),'r16','left')}${renderRound('Cuartos de final',qf.slice(0,2),'qf','left')}${renderRound('Semifinal',sf.slice(0,1),'sf','left')}<section class="center"><div class="center-title">Final</div>${matchCard(final[0],'center',true)}<div class="third-title">Partido por el tercer puesto</div>${matchCard(third[0],'center',true)}</section>${renderRound('Semifinal',sf.slice(1,2),'sfr','right')}${renderRound('Cuartos de final',qf.slice(2,4),'qfr','right')}${renderRound('Octavos de final',r16.slice(4,8),'r16r','right')}${renderRound('Dieciseisavos de final',r32.slice(8,16),'r32r','right')}`}
function setupTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));$('groupsView').style.display=btn.dataset.view==='groups'?'block':'none';$('knockoutView').style.display=btn.dataset.view==='knockout'?'block':'none'}))}
async function loadData(){const res=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});const payload=await res.json();games=Array.isArray(payload)?payload:payload.games||[];$('lastUpdated').textContent=payload.updatedAt?new Date(payload.updatedAt).toLocaleString('es-MX'):'—';buildTables();renderGroups();renderBracket();setupTabs()}
loadData().catch(e=>{console.error(e);document.querySelector('main').innerHTML='<div class="empty">No se pudo cargar información.</div>'});
</script>
</body>
</html>
