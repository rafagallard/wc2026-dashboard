name: Patch penalties and predictions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/patch_penales_y_predicciones.py'

permissions:
  contents: write

jobs:
  patch-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply penalties and predictions patch
        run: python scripts/patch_penales_y_predicciones.py

      - name: Commit patched files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Support penalties and prediction date filter'
          file_pattern: 'scripts/update_worldcup_results.py index.html predicciones.html clasificacion.html worldcup_results.json'
