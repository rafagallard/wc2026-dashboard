name: Update World Cup data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/update_worldcup_results.py'
      - '.github/workflows/update-worldcup.yml'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update JSON data
        run: python scripts/update_worldcup_results.py

      - name: Commit changes if data changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update World Cup results data'
          file_pattern: worldcup_results.json
